# Deny all ingress by default, then allow only what is needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: damagochat
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# API pods: accept traffic from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: damagochat
spec:
  podSelector:
    matchLabels:
      app: damagochat-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
---
# Redis: accept from API and worker pods only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: damagochat
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: damagochat-api
        - podSelector:
            matchLabels:
              app: damagochat-worker
      ports:
        - port: 6379
---
# Meilisearch: accept from API pods only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-meilisearch
  namespace: damagochat
spec:
  podSelector:
    matchLabels:
      app: meilisearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: damagochat-api
      ports:
        - port: 7700
