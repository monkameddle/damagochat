apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: damagochat-worker
  namespace: damagochat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: damagochat-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # drain jobs before removing pods
